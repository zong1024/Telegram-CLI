name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  TDLIB_VERSION: "1.8.63"

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache TDLib
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/libtdjson*
          key: tdlib-${{ env.TDLIB_VERSION }}

      - name: Install TDLib
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gperf zlib1g-dev libssl-dev
          git clone --depth 1 --branch "v${{ env.TDLIB_VERSION }}" https://github.com/tdlib/td.git /tmp/td
          cd /tmp/td && mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local -DTD_ENABLE_JNI=OFF
          cmake --build . --parallel $(nproc)
          sudo cmake --install .
          sudo ldconfig

      - name: Check
        run: cargo check --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace
